server.port=8082
spring.application.name=ms-guias

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Google Cloud Storage (S3-compatible)
aws.s3.bucket=${GCS_BUCKET_NAME}
aws.s3.region=auto
aws.s3.endpoint=https://storage.googleapis.com
aws.access-key-id=${GCS_ACCESS_KEY}
aws.secret-access-key=${GCS_SECRET_KEY}

# Local EFS replacement (mounted volume)
efs.mount-path=/app/efs
efs.temp-dir=${efs.mount-path}/guias-temporales

# URL of ms-pedidos service (inside Docker network)
pedidos.service.url=${PEDIDOS_SERVICE_URL:-http://ms-pedidos:8081}