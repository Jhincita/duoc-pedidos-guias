server.port=8082
spring.application.name=ms-guias

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# AWS S3
aws.s3.bucket-name=${AWS_S3_BUCKET:guias-despacho-buckett}
aws.s3.region=${AWS_S3_REGION:us-east-2}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.session-token=${AWS_SESSION_TOKEN:}

# Local EFS replacement (mounted volume)
efs.mount-path=/app/efs
efs.temp-dir=${efs.mount-path}/guias-temporales

# URL of ms-pedidos service (inside Docker network)
pedidos.service.url=${PEDIDOS_SERVICE_URL:-http://ms-pedidos:8081}

# Azure AD B2C
azure.jwks.uri=${AZURE_JWKS_URI}
azure.issuer.uri=${AZURE_ISSUER_URI}