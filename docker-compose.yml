version: '3.8'

services:
  ms-pedidos:
    image: ${DOCKERHUB_USERNAME}/ms-pedidos:latest
    container_name: ms-pedidos
    ports:
      - "8081:8081"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      AZURE_JWKS_URI: ${AZURE_JWKS_URI}
      AZURE_ISSUER_URI: ${AZURE_ISSUER_URI}
    restart: unless-stopped

  ms-guias:
    image: ${DOCKERHUB_USERNAME}/ms-guias:latest
    container_name: ms-guias
    ports:
      - "8082:8082"
    depends_on:
      - ms-pedidos
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      PEDIDOS_SERVICE_URL: http://ms-pedidos:8081
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AZURE_JWKS_URI: ${AZURE_JWKS_URI}
      AZURE_ISSUER_URI: ${AZURE_ISSUER_URI}
    volumes:
      - ./efs-data:/app/efs
    restart: unless-stopped