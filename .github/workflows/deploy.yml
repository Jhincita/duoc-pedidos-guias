name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build ms-pedidos JAR
        run: |
          cd sistema-gestion-pedidos
          mvn clean package -DskipTests

      - name: Build ms-guias JAR
        run: |
          cd ms-guias
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push ms-pedidos
        uses: docker/build-push-action@v5
        with:
          context: ./sistema-gestion-pedidos
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/ms-pedidos:latest

      - name: Build and push ms-guias
        uses: docker/build-push-action@v5
        with:
          context: ./ms-guias
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/ms-guias:latest

      - name: Copy Docker Compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app
            cat > .env << 'EOF'
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            PEDIDOS_DB_URL=${{ secrets.DB_URL }}
            PEDIDOS_DB_USERNAME=${{ secrets.DB_USERNAME }}
            PEDIDOS_DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            GUIAS_DB_URL=${{ secrets.DB_URL }}
            GUIAS_DB_USERNAME=${{ secrets.DB_USERNAME }}
            GUIAS_DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AZURE_JWKS_URI=${{ secrets.AZURE_JWKS_URI }}
            AZURE_ISSUER_URI=${{ secrets.AZURE_ISSUER_URI }}
            EOF
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Neither docker compose nor docker-compose is installed" >&2
              exit 1
            fi
            $COMPOSE_CMD down
            $COMPOSE_CMD pull
            $COMPOSE_CMD up -d
