name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build ms-pedidos JAR
        run: |
          cd sistema-gestion-pedidos
          mvn clean package -DskipTests
      - name: Build ms-producer JAR
        run: |
          cd ms-producer
          mvn clean package -DskipTests
      - name: Build ms-consumer JAR
        run: |
          cd ms-consumer
          mvn clean package -DskipTests
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Build and push ms-pedidos
        uses: docker/build-push-action@v5
        with:
          context: ./sistema-gestion-pedidos
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/ms-pedidos:latest
      - name: Build and push ms-producer
        uses: docker/build-push-action@v5
        with:
          context: ./ms-producer
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/ms-producer:latest
      - name: Build and push ms-consumer
        uses: docker/build-push-action@v5
        with:
          context: ./ms-consumer
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/ms-consumer:latest
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app

            cat > .env << 'EOF'
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
            AZURE_JWKS_URI=${{ secrets.AZURE_JWKS_URI }}
            AZURE_ISSUER_URI=${{ secrets.AZURE_ISSUER_URI }}
            EOF

            cat > docker-compose.yml << 'COMPOSE_EOF'
            version: '3.8'
            services:
              rabbitmq:
                image: rabbitmq:3-management
                container_name: rabbitmq-guias
                ports:
                  - "5672:5672"
                  - "15672:15672"
                environment:
                  RABBITMQ_DEFAULT_USER: admin
                  RABBITMQ_DEFAULT_PASS: admin123
                restart: unless-stopped
              ms-pedidos:
                image: ${DOCKERHUB_USERNAME}/ms-pedidos:latest
                container_name: ms-pedidos
                ports:
                  - "8081:8081"
                environment:
                  DB_URL: ${DB_URL}
                  DB_USERNAME: ${DB_USERNAME}
                  DB_PASSWORD: ${DB_PASSWORD}
                  AZURE_JWKS_URI: ${AZURE_JWKS_URI}
                  AZURE_ISSUER_URI: ${AZURE_ISSUER_URI}
                depends_on:
                  - rabbitmq
                restart: unless-stopped
              ms-producer:
                image: ${DOCKERHUB_USERNAME}/ms-producer:latest
                container_name: ms-producer
                ports:
                  - "8082:8082"
                depends_on:
                  - ms-pedidos
                  - rabbitmq
                environment:
                  DB_URL: ${DB_URL}
                  DB_USERNAME: ${DB_USERNAME}
                  DB_PASSWORD: ${DB_PASSWORD}
                  PEDIDOS_SERVICE_URL: http://ms-pedidos:8081
                  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
                  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
                  AWS_S3_BUCKET: ${AWS_S3_BUCKET}
                  AWS_S3_REGION: ${AWS_S3_REGION}
                  AZURE_JWKS_URI: ${AZURE_JWKS_URI}
                  AZURE_ISSUER_URI: ${AZURE_ISSUER_URI}
                volumes:
                  - ./efs-data:/app/efs
                restart: unless-stopped
              ms-consumer:
                image: ${DOCKERHUB_USERNAME}/ms-consumer:latest
                container_name: ms-consumer
                ports:
                  - "8083:8083"
                depends_on:
                  - rabbitmq
                environment:
                  DB_URL: ${DB_URL}
                  DB_USERNAME: ${DB_USERNAME}
                  DB_PASSWORD: ${DB_PASSWORD}
                restart: unless-stopped
            COMPOSE_EOF

            docker-compose down || true
            docker-compose pull
            docker-compose up -d
